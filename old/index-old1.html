<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE VAULT 3 — Retro ROM Collection 3</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #10101a;
    --surface2: #181825;
    --border: #2a2a45;
    --accent: #00ffc8;
    --accent2: #ff4d8d;
    --accent3: #ffe066;
    --text: #e0e0f0;
    --text-dim: #7070a0;
    --scanline: rgba(0,0,0,0.18);
    --glow: 0 0 12px var(--accent), 0 0 40px rgba(0,255,200,0.15);
    --glow2: 0 0 12px var(--accent2), 0 0 40px rgba(255,77,141,0.15);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* CRT scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      var(--scanline) 3px,
      var(--scanline) 4px
    );
    pointer-events: none;
    z-index: 9999;
    opacity: 0.35;
  }

  /* Animated grid background */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,200,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,200,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: relative;
    z-index: 10;
    padding: 2rem 3rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(180deg, rgba(0,255,200,0.04) 0%, transparent 100%);
  }

  .logo {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
  }

  .logo-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 1.5rem;
    color: var(--accent);
    text-shadow: var(--glow);
    letter-spacing: 0.1em;
    animation: flicker 6s infinite;
  }

  .logo-sub {
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.3em;
    text-transform: uppercase;
  }

  @keyframes flicker {
    0%, 94%, 96%, 100% { opacity: 1; }
    95% { opacity: 0.6; }
  }

  .header-stats {
    display: flex;
    gap: 2rem;
    font-size: 0.7rem;
    color: var(--text-dim);
  }

  .stat { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
  .stat-val { color: var(--accent); font-family: 'Press Start 2P', monospace; font-size: 0.85rem; }

  /* ── CONTROLS BAR ── */
  .controls {
    position: relative;
    z-index: 10;
    display: flex;
    gap: 1rem;
    padding: 1.25rem 3rem;
    border-bottom: 1px solid var(--border);
    align-items: center;
    flex-wrap: wrap;
    background: var(--surface);
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
  }

  .search-wrap::before {
    content: '⌕';
    position: absolute;
    left: 0.9rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--accent);
    font-size: 1.1rem;
    pointer-events: none;
  }

  input[type="search"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    padding: 0.6rem 1rem 0.6rem 2.5rem;
    border-radius: 3px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input[type="search"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(0,255,200,0.1);
  }

  input[type="search"]::placeholder { color: var(--text-dim); }

  .filter-pills {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
  }

  .pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    padding: 0.4rem 0.9rem;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    user-select: none;
  }

  .pill:hover { border-color: var(--accent); color: var(--accent); }
  .pill.active {
    background: rgba(0,255,200,0.1);
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 8px rgba(0,255,200,0.2);
  }

  .pill[data-system="NES"].active    { --accent: #ff4d8d; background: rgba(255,77,141,0.1); border-color: #ff4d8d; color: #ff4d8d; box-shadow: var(--glow2); }
  .pill[data-system="SNES"].active   { --accent: #ffe066; background: rgba(255,224,102,0.1); border-color: #ffe066; color: #ffe066; }
  .pill[data-system="GB"].active     { --accent: #a0ffb0; background: rgba(160,255,176,0.1); border-color: #a0ffb0; color: #a0ffb0; }
  .pill[data-system="GBA"].active    { --accent: #b08fff; background: rgba(176,143,255,0.1); border-color: #b08fff; color: #b08fff; }
  .pill[data-system="GEN"].active    { --accent: #ff9a3c; background: rgba(255,154,60,0.1); border-color: #ff9a3c; color: #ff9a3c; }
  .pill[data-system="N64"].active    { --accent: #3cf0ff; background: rgba(60,240,255,0.1); border-color: #3cf0ff; color: #3cf0ff; }
  .pill[data-system="A26"].active    { --accent: #ff8c42; background: rgba(255,140,66,0.1); border-color: #ff8c42; color: #ff8c42; }

  .sort-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    padding: 0.5rem 0.8rem;
    border-radius: 3px;
    outline: none;
    cursor: pointer;
  }

  /* ── MAIN LAYOUT ── */
  main {
    position: relative;
    z-index: 10;
    display: grid;
    grid-template-columns: 1fr;
    padding: 2rem 3rem;
    gap: 2rem;
  }

  /* ── GAME GRID ── */
  .game-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 1rem;
  }

  .game-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
    overflow: hidden;
    position: relative;
    animation: fadeIn 0.3s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .game-card:hover {
    transform: translateY(-4px) scale(1.02);
    border-color: var(--card-accent, var(--accent));
    box-shadow: 0 8px 30px rgba(0,0,0,0.4), 0 0 15px rgba(0,255,200,0.1);
  }

  .game-card:hover .card-overlay { opacity: 1; }

  .card-art {
    width: 100%;
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3.5rem;
    background: var(--card-bg, var(--surface2));
    position: relative;
    overflow: hidden;
    user-select: none;
  }

  .card-art::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 60%);
  }

  .card-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,255,200,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.15s;
    font-size: 2rem;
  }

  .card-info {
    padding: 0.65rem 0.75rem;
  }

  .card-name {
    font-size: 0.65rem;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 0.35rem;
    font-family: 'Exo 2', sans-serif;
    font-weight: 600;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-system {
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    color: var(--card-accent, var(--accent));
    text-transform: uppercase;
    border: 1px solid currentColor;
    padding: 1px 5px;
    border-radius: 2px;
  }

  .card-year {
    font-size: 0.6rem;
    color: var(--text-dim);
  }

  .card-fav {
    position: absolute;
    top: 6px;
    right: 6px;
    font-size: 0.9rem;
    opacity: 0;
    transition: opacity 0.2s;
    cursor: pointer;
    z-index: 2;
  }

  .game-card:hover .card-fav,
  .game-card .card-fav.active { opacity: 1; }

  /* ── EMPTY STATE ── */
  .empty-state {
    grid-column: 1 / -1;
    padding: 4rem;
    text-align: center;
    color: var(--text-dim);
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }

  .empty-state.visible { display: flex; }
  .empty-state .icon { font-size: 3rem; }
  .empty-state p { font-size: 0.75rem; letter-spacing: 0.1em; }

  /* ── MODAL ── */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(6px);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }

  .modal-backdrop.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    width: 100%;
    max-width: 780px;
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
    animation: slideUp 0.25s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .modal-header {
    padding: 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 1.25rem;
    align-items: flex-start;
    background: linear-gradient(135deg, rgba(0,255,200,0.04) 0%, transparent 60%);
  }

  .modal-art {
    width: 90px;
    height: 90px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }

  .modal-titles { flex: 1; }

  .modal-game-name {
    font-family: 'Exo 2', sans-serif;
    font-weight: 800;
    font-size: 1.35rem;
    margin-bottom: 0.4rem;
    line-height: 1.2;
  }

  .modal-tags {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
    margin-top: 0.5rem;
  }

  .tag {
    font-size: 0.62rem;
    padding: 2px 8px;
    border-radius: 2px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border: 1px solid currentColor;
  }

  .tag.system { color: var(--accent); }
  .tag.genre  { color: var(--text-dim); }
  .tag.year   { color: var(--accent3); }

  .modal-close {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 1rem;
    width: 32px;
    height: 32px;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.15s;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .modal-close:hover { border-color: var(--accent2); color: var(--accent2); }

  .modal-body { padding: 1.5rem; }

  .emulator-frame {
    width: 100%;
    aspect-ratio: 4/3;
    background: #000;
    border: 1px solid var(--border);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1.25rem;
    position: relative;
    overflow: hidden;
  }

  .emulator-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    color: var(--text-dim);
    text-align: center;
  }

  .emulator-placeholder .big-icon { font-size: 3.5rem; }

  .emulator-placeholder p {
    font-size: 0.7rem;
    line-height: 1.7;
    max-width: 340px;
  }

  .emu-iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: none;
  }

  .btn-play {
    background: var(--accent);
    color: #000;
    font-family: 'Press Start 2P', monospace;
    font-size: 0.65rem;
    border: none;
    padding: 0.75rem 1.75rem;
    cursor: pointer;
    border-radius: 3px;
    letter-spacing: 0.05em;
    transition: all 0.15s;
    box-shadow: 0 0 20px rgba(0,255,200,0.3);
  }

  .btn-play:hover {
    transform: scale(1.04);
    box-shadow: 0 0 30px rgba(0,255,200,0.5);
  }

  .modal-desc {
    font-size: 0.78rem;
    color: var(--text-dim);
    line-height: 1.8;
    margin-bottom: 1.25rem;
  }

  .modal-meta-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 0.75rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
  }

  .meta-item { display: flex; flex-direction: column; gap: 3px; }
  .meta-label { font-size: 0.6rem; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; }
  .meta-val { font-size: 0.75rem; color: var(--text); }

  /* ── ADD GAME PANEL ── */
  .add-section {
    border: 1px dashed var(--border);
    border-radius: 4px;
    padding: 1.5rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--text-dim);
    font-size: 0.75rem;
  }

  .add-section:hover { border-color: var(--accent); color: var(--accent); }
  .add-section .add-icon { font-size: 2rem; margin-bottom: 0.5rem; display: block; }

  /* ── FOOTER ── */
  footer {
    position: relative;
    z-index: 10;
    padding: 1.5rem 3rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.65rem;
    color: var(--text-dim);
  }

  .footer-blink {
    display: inline-block;
    width: 8px;
    height: 12px;
    background: var(--accent);
    animation: blink 1s step-end infinite;
    vertical-align: middle;
    margin-left: 4px;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  /* ── SYSTEM COLOR MAP ── */
  .sys-NES  { --card-accent: #ff4d8d; --card-bg: #1a0f14; }
  .sys-SNES { --card-accent: #ffe066; --card-bg: #1a1800; }
  .sys-GB   { --card-accent: #a0ffb0; --card-bg: #0f1a12; }
  .sys-GBA  { --card-accent: #b08fff; --card-bg: #130f1a; }
  .sys-GEN  { --card-accent: #ff9a3c; --card-bg: #1a1008; }
  .sys-N64  { --card-accent: #3cf0ff; --card-bg: #001a1a; }
  .sys-PS1  { --card-accent: #7ab3ff; --card-bg: #0a0f1a; }
  .sys-A26  { --card-accent: #ff8c42; --card-bg: #1a0e00; }

  /* ── RESPONSIVE ── */
  @media (max-width: 700px) {
    header, .controls, main, footer { padding-left: 1.2rem; padding-right: 1.2rem; }
    .logo-title { font-size: 1rem; }
    .game-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
  }
</style>
</head>
