<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE VAULT — Retro ROM Collection</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #10101a;
    --surface2: #181825;
    --border: #2a2a45;
    --accent: #00ffc8;
    --accent2: #ff4d8d;
    --accent3: #ffe066;
    --text: #e0e0f0;
    --text-dim: #7070a0;
    --scanline: rgba(0,0,0,0.18);
    --glow: 0 0 12px var(--accent), 0 0 40px rgba(0,255,200,0.15);
    --glow2: 0 0 12px var(--accent2), 0 0 40px rgba(255,77,141,0.15);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* CRT scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      var(--scanline) 3px,
      var(--scanline) 4px
    );
    pointer-events: none;
    z-index: 9999;
    opacity: 0.35;
  }

  /* Animated grid background */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,200,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,200,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 10;
    padding: 2rem 3rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(180deg, rgba(0,255,200,0.04) 0%, transparent 100%);
  }

  .logo { display: flex; flex-direction: column; gap: 0.25rem; }
  .logo-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 1.5rem;
    color: var(--accent);
    text-shadow: var(--glow);
    letter-spacing: 0.1em;
    animation: flicker 6s infinite;
  }
  .logo-sub { font-size: 0.7rem; color: var(--text-dim); letter-spacing: 0.3em; text-transform: uppercase; }

  @keyframes flicker {
    0%, 94%, 96%, 100% { opacity: 1; }
    95% { opacity: 0.6; }
  }

  .header-stats { display: flex; gap: 2rem; font-size: 0.7rem; color: var(--text-dim); }
  .stat { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
  .stat-val { color: var(--accent); font-family: 'Press Start 2P', monospace; font-size: 0.85rem; }

  .controls {
    position: relative;
    z-index: 10;
    display: flex;
    gap: 1rem;
    padding: 1.25rem 3rem;
    border-bottom: 1px solid var(--border);
    align-items: center;
    flex-wrap: wrap;
    background: var(--surface);
  }

  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-wrap::before {
    content: '⌕';
    position: absolute;
    left: 0.9rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--accent);
    font-size: 1.1rem;
    pointer-events: none;
  }

  input[type="search"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    padding: 0.6rem 1rem 0.6rem 2.5rem;
    border-radius: 3px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input[type="search"]:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(0,255,200,0.1); }

  .filter-pills { display: flex; gap: 0.4rem; flex-wrap: wrap; }
  .pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    padding: 0.4rem 0.9rem;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }
  .pill.active { background: rgba(0,255,200,0.1); border-color: var(--accent); color: var(--accent); }

  main { position: relative; z-index: 10; display: grid; grid-template-columns: 1fr; padding: 2rem 3rem; gap: 2rem; }

  .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; }
  .game-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
    overflow: hidden;
    position: relative;
    animation: fadeIn 0.3s ease both;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .game-card:hover { transform: translateY(-4px); border-color: var(--card-accent, var(--accent)); }
  .card-art { width: 100%; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; background: var(--card-bg, var(--surface2)); }
  .card-info { padding: 0.65rem 0.75rem; }
  .card-name { font-size: 0.65rem; font-weight: 600; font-family: 'Exo 2', sans-serif; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(6px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 1.5rem; }
  .modal-backdrop.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; width: 100%; max-width: 780px; max-height: 90vh; overflow-y: auto; }

  .emulator-frame { width: 100%; aspect-ratio: 4/3; background: #000; border-radius: 4px; display: flex; align-items: center; justify-content: center; margin-bottom: 1.25rem; }
  .btn-play { background: var(--accent); color: #000; font-family: 'Press Start 2P', monospace; font-size: 0.65rem; border: none; padding: 0.75rem 1.75rem; cursor: pointer; border-radius: 3px; }

  footer { padding: 1.5rem 3rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; font-size: 0.65rem; color: var(--text-dim); }
  .footer-blink { display: inline-block; width: 8px; height: 12px; background: var(--accent); animation: blink 1s step-end infinite; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  .sys-NES  { --card-accent: #ff4d8d; --card-bg: #1a0f14; }
  .sys-A26  { --card-accent: #ff8c42; --card-bg: #1a0e00; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-title">THE VAULT</div>
    <div class="logo-sub">Retro ROM Collection — Est. 2024</div>
  </div>
  <div class="header-stats">
    <div class="stat"><span class="stat-val" id="total-count">0</span><span>TITLES</span></div>
    <div class="stat"><span class="stat-val" id="system-count">0</span><span>SYSTEMS</span></div>
    <div class="stat"><span class="stat-val" id="visible-count">0</span><span>SHOWING</span></div>
  </div>
</header>

<div class="controls">
  <div class="search-wrap"><input type="search" id="search" placeholder="Search titles..." autocomplete="off"></div>
  <div class="filter-pills" id="filter-pills">
    <div class="pill active" data-system="ALL">All</div>
    <div class="pill" data-system="NES">NES</div>
    <div class="pill" data-system="A26">Atari 2600</div>
  </div>
</div>

<main>
  <div class="game-grid" id="game-grid">
    <div class="empty-state" id="empty-state" style="display:none">NO GAMES FOUND</div>
  </div>
</main>

<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal" id="modal">
    <div style="padding:1.5rem; display:flex; justify-content:space-between; border-bottom:1px solid var(--border);">
        <h2 id="modal-name"></h2>
        <button id="modal-close" style="background:none; border:none; color:white; cursor:pointer;">✕</button>
    </div>
    <div class="modal-body" style="padding:1.5rem;">
      <div class="emulator-frame">
        <div id="emu-placeholder">
          <button class="btn-play" id="btn-play">▶ PLAY NOW</button>
        </div>
        <iframe id="emu-iframe" style="display:none; width:100%; height:100%; border:none;" allowfullscreen></iframe>
      </div>
      <p id="modal-desc" style="color:var(--text-dim); font-size:0.8rem;"></p>
    </div>
  </div>
</div>

<footer>
  <span>THE VAULT &mdash; Personal ROM Archive</span>
  <span>READY<span class="footer-blink"></span></span>
</footer>

<script>
const GAMES = [
  { id: "a26-adventure", name: "Adventure", system: "A26", year: 1977, genre: "Action", emoji: "🛩️", desc: "Adventure.", romUrl: "roms/adventure.zip", emuCore: "atari2600" }
];

let activeSystem = "ALL";
let searchQuery = "";

function renderGrid() {
  const grid = document.getElementById("game-grid");
  grid.innerHTML = "";
  
  const filtered = GAMES.filter(g => 
    (activeSystem === "ALL" || g.system === activeSystem) &&
    (g.name.toLowerCase().includes(searchQuery))
  );

  filtered.forEach(game => {
    const card = document.createElement("div");
    card.className = `game-card sys-${game.system}`;
    card.innerHTML = `<div class="card-art">${game.emoji}</div><div class="card-info"><div class="card-name">${game.name}</div></div>`;
    card.onclick = () => openModal(game);
    grid.appendChild(card);
  });
  
  document.getElementById("total-count").textContent = GAMES.length;
  document.getElementById("visible-count").textContent = filtered.length;
}

function openModal(game) {
  document.getElementById("modal-name").textContent = game.name;
  document.getElementById("modal-desc").textContent = game.desc;
  document.getElementById("modal-backdrop").classList.add("open");
  
  document.getElementById("btn-play").onclick = () => {
    closeModal();
    launchEmulator(game);
  };
}

function closeModal() { document.getElementById("modal-backdrop").classList.remove("open"); }
document.getElementById("modal-close").onclick = closeModal;

function launchEmulator(game) {
  const params = new URLSearchParams({
    core:  game.emuCore,
    rom:   game.romUrl,
    title: game.name
  });
  window.location.href = "emulator.html?" + params.toString();
}

document.getElementById("filter-pills").onclick = (e) => {
    if(e.target.classList.contains('pill')) {
        document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
        e.target.classList.add('active');
        activeSystem = e.target.dataset.system;
        renderGrid();
    }
};
document.getElementById("search").oninput = (e) => { searchQuery = e.target.value.toLowerCase(); renderGrid(); };

renderGrid();
</script>
</body>
</html>
