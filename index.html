<script>
// (Ensure your GAMES array includes the Adventure link you were looking for)
const GAMES = [
  // ... other games ...
  {
    id: "a26-adventure",
    name: "Adventure",
    system: "A26",
    year: 1980,
    genre: "Action-Adventure",
    emoji: "🐉",
    desc: "The grandfather of graphical adventure games. Navigate castles, slay dragons, and find the first Easter egg.",
    developer: "Atari",
    players: "1",
    romUrl: "roms/adventure.a26",
    emuCore: "stella2014" // Updated to match the core the loader is looking for
  }
];

// ... (Keep existing renderGrid, openModal, and filter logic) ...

function launchEmulator(game) {
  const screen = document.getElementById("emu-screen");
  document.getElementById("emu-screen-title").textContent = game.name.toUpperCase() + " — " + game.system;
  screen.style.display = "flex";
  document.body.style.overflow = "hidden";

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      const wrap = document.getElementById("emu-game-wrap");
      const gameDiv = document.getElementById("game");
      gameDiv.innerHTML = "";
      gameDiv.style.cssText = `width:${wrap.offsetWidth}px;height:${wrap.offsetHeight}px;display:block;`;

      // FIXED EMULATOR GLOBALS
      window.EJS_player        = "#game";
      window.EJS_core          = game.emuCore || "stella2014";
      window.EJS_gameUrl       = game.romUrl;
      window.EJS_pathtodata    = "data/"; 
      window.EJS_language      = "en-US"; // FIX: Prevents 404 on en-CA.json
      window.EJS_startOnLoaded = true;
      
      // FIX: Explicitly set gameType for Atari
      window.EJS_gameType      = game.system === "A26" ? "a26" : game.system.toLowerCase();

      // Refresh the loader script
      const old = document.getElementById("ejs-loader");
      if (old) old.remove();
      const s = document.createElement("script");
      s.id  = "ejs-loader";
      s.src = "data/loader.js";
      document.body.appendChild(s);
    });
  });
}

function exitEmulator() {
  const screen = document.getElementById("emu-screen");
  screen.style.display = "none";
  document.body.style.overflow = "";

  const old = document.getElementById("ejs-loader");
  if (old) old.remove();
  const gameDiv = document.getElementById("game");
  if (gameDiv) gameDiv.innerHTML = "";
  
  // Full cleanup of injected styles/scripts
  document.querySelectorAll("script[src*='emulatorjs'], link[href*='emulatorjs']").forEach(el => el.remove());
  
  // Clear global state
  ['EJS_player', 'EJS_core', 'EJS_gameUrl', 'EJS_pathtodata', 'EJS_gameType'].forEach(key => delete window[key]);
}
</script>
